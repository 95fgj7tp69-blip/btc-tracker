[build]
  command   = "npm install && npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/transactions/*"
  to   = "/.netlify/functions/transactions/:splat"
  status = 200

[[redirects]]
  from = "/api/transactions"
  to   = "/.netlify/functions/transactions"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
