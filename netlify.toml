[build]
  command   = "npm install && npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/api/prices"
  to   = "/.netlify/functions/prices"
  status = 200

[[redirects]]
  from = "/api/history"
  to   = "/.netlify/functions/history"
  status = 200

[[redirects]]
  from = "/api/transactions/*"
  to   = "/.netlify/functions/transactions/:splat"
  status = 200

[[redirects]]
  from = "/api/transactions"
  to   = "/.netlify/functions/transactions"
  status = 200

[[redirects]]
  from = "/api/claude"
  to   = "/.netlify/functions/claude"
  status = 200

[[redirects]]
  from = "/api/market"
  to   = "/.netlify/functions/market"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
